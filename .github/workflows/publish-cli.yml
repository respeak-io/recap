name: Publish @respeak/recap to npm

# Publish the recap CLI on a version tag (e.g. `recap-v0.3.0`), so product
# repos pick up fixes by bumping the version they run via npx / the Action.
on:
  push:
    tags:
      - "recap-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Guard against a tag / package.json version mismatch (e.g. tag
      # `recap-v0.3.0` must match packages/cli/package.json "version").
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/recap-v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#recap-v}"
          PKG_VERSION="$(node -p "require('./packages/cli/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) != package.json version ($PKG_VERSION)"
            exit 1
          fi

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @respeak/recap build

      - run: pnpm --filter @respeak/recap publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
