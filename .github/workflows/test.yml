name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Type-check + build the recap CLI (also gates the sync client).
      - run: pnpm --filter @respeak/recapbuild

      # App + v1 API route tests (root vitest).
      - run: pnpm test

      # CLI unit tests, incl. cross-link rewrite + manifest validation.
      - run: pnpm --filter @respeak/recaptest
